name: Run NWJSSP Program

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  run-final-instances:
    name: Run program in final mode (instances)
    runs-on: ubuntu-latest
    timeout-minutes: 540
    env:
      PYTHONUNBUFFERED: 1
      FINAL_ALGO_MODE: mslns
      INSTANCES_DIR: instances

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install openpyxl

      - name: Run program in final mode (instances)
        run: python -c "import main; main.MODE='final'; main.main()"

      - name: List generated Excel files
        run: find . -maxdepth 2 -name 'NWJSSP_ArturoMurgueytio_*.xlsx' -print

      - name: Upload generated Excel artifacts (final-instances)
        uses: actions/upload-artifact@v4
        with:
          name: nwjssp-excel-results-final-instances
          path: NWJSSP_ArturoMurgueytio_*.xlsx

